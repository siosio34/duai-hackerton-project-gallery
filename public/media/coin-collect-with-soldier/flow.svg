<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1240 660" font-family="'Pretendard','Apple SD Gothic Neo','Noto Sans KR',system-ui,sans-serif">
  <defs>
    <marker id="ah" markerWidth="9" markerHeight="9" refX="7" refY="4.5" orient="auto">
      <path d="M0,0 L9,4.5 L0,9 z" fill="#16140f" opacity="0.45"/>
    </marker>
    <marker id="ahg" markerWidth="9" markerHeight="9" refX="7" refY="4.5" orient="auto">
      <path d="M0,0 L9,4.5 L0,9 z" fill="#15803d"/>
    </marker>
  </defs>

  <rect width="1240" height="660" fill="#ece8dd"/>

  <!-- ============ MAIN PATH ============ -->
  <!-- A: 증빙 업로드 -->
  <g>
    <rect x="40" y="96" width="186" height="92" rx="9" fill="#f3f0e7" stroke="#16140f" stroke-opacity="0.14"/>
    <rect x="40" y="96" width="5" height="92" rx="2.5" fill="#15803d"/>
    <text x="64" y="132" font-size="17" font-weight="700" fill="#16140f">① 증빙 업로드</text>
    <text x="64" y="158" font-size="13" fill="#16140f" opacity="0.62">군 신분증·병적증명서</text>
    <text x="64" y="176" font-size="13" fill="#16140f" opacity="0.62">S3 저장 · 업로드 인증</text>
  </g>
  <!-- B: 자동 1차 검수 -->
  <g>
    <rect x="278" y="96" width="200" height="92" rx="9" fill="#f3f0e7" stroke="#16140f" stroke-opacity="0.14"/>
    <rect x="278" y="96" width="5" height="92" rx="2.5" fill="#15803d"/>
    <text x="302" y="132" font-size="17" font-weight="700" fill="#16140f">② 자동 1차 검수</text>
    <text x="302" y="158" font-size="13" fill="#16140f" opacity="0.62">필드 가중치 점수 산출</text>
    <text x="302" y="176" font-size="13" fill="#16140f" opacity="0.62">자체 구현 · 외부 OCR 없음</text>
  </g>
  <!-- C: 임계 판정 -->
  <g>
    <rect x="530" y="96" width="200" height="92" rx="9" fill="#f3f0e7" stroke="#16140f" stroke-opacity="0.14"/>
    <rect x="530" y="96" width="5" height="92" rx="2.5" fill="#15803d"/>
    <text x="554" y="132" font-size="17" font-weight="700" fill="#16140f">③ 임계 판정</text>
    <text x="554" y="158" font-size="13" fill="#16140f" opacity="0.62">event_config 단일 권위</text>
    <text x="554" y="176" font-size="13" fill="#16140f" opacity="0.62">승인 / 보류 / 반려</text>
  </g>
  <!-- D: 인증 완료 -->
  <g>
    <rect x="782" y="96" width="200" height="92" rx="9" fill="#f3f0e7" stroke="#16140f" stroke-opacity="0.14"/>
    <rect x="782" y="96" width="5" height="92" rx="2.5" fill="#15803d"/>
    <text x="806" y="132" font-size="17" font-weight="700" fill="#16140f">④ 군 인증 완료</text>
    <text x="806" y="158" font-size="13" fill="#16140f" opacity="0.62">입대일·최초 계급 추출</text>
    <text x="806" y="176" font-size="13" fill="#16140f" opacity="0.62">재증빙 없이 1회로 확정</text>
  </g>

  <!-- main arrows -->
  <g fill="none" stroke="#16140f" stroke-opacity="0.4" stroke-width="2">
    <line x1="226" y1="142" x2="272" y2="142" marker-end="url(#ah)"/>
    <line x1="478" y1="142" x2="524" y2="142" marker-end="url(#ah)"/>
    <line x1="730" y1="142" x2="776" y2="142" marker-end="url(#ah)"/>
  </g>

  <!-- branch callouts under C -->
  <g>
    <text x="630" y="222" font-size="12.5" fill="#15803d" font-weight="600" text-anchor="middle">승인 → 인증 완료</text>
    <text x="630" y="244" font-size="12.5" fill="#16140f" opacity="0.62" text-anchor="middle">회색지대 → 관리자 2차 검수</text>
    <text x="630" y="266" font-size="12.5" fill="#16140f" opacity="0.62" text-anchor="middle">반려 → 종료</text>
    <text x="630" y="294" font-size="12" fill="#b45309" font-weight="600" text-anchor="middle">⚑ 임계 미구성 시 fail-safe : 전건 관리자 대기</text>
  </g>

  <!-- ============ REWARD PANEL ============ -->
  <g>
    <rect x="1010" y="60" width="200" height="234" rx="11" fill="#f3f0e7" stroke="#16140f" stroke-opacity="0.16"/>
    <text x="1110" y="92" font-size="15" font-weight="700" fill="#15803d" text-anchor="middle">실제 코인 지급</text>
    <text x="1110" y="111" font-size="11.5" fill="#16140f" opacity="0.55" text-anchor="middle">wallet_address · tx_hash</text>

    <rect x="1028" y="126" width="164" height="46" rx="7" fill="#ece8dd" stroke="#16140f" stroke-opacity="0.12"/>
    <text x="1042" y="148" font-size="13.5" font-weight="700" fill="#16140f">Layer 1 · 기본</text>
    <text x="1042" y="165" font-size="11.5" fill="#16140f" opacity="0.6">인증 완료 즉시</text>

    <rect x="1028" y="180" width="164" height="46" rx="7" fill="#ece8dd" stroke="#16140f" stroke-opacity="0.12"/>
    <text x="1042" y="202" font-size="13.5" font-weight="700" fill="#16140f">Layer 2 · 진급</text>
    <text x="1042" y="219" font-size="11.5" fill="#16140f" opacity="0.6">진급 시점마다 자동</text>

    <rect x="1028" y="234" width="164" height="46" rx="7" fill="#ece8dd" stroke="#16140f" stroke-opacity="0.12"/>
    <text x="1042" y="256" font-size="13.5" font-weight="700" fill="#16140f">Layer 3 · 전역</text>
    <text x="1042" y="273" font-size="11.5" fill="#16140f" opacity="0.6">유지 판정 차등 지급</text>
  </g>
  <!-- D → reward panel -->
  <path d="M982,142 C 996,142 996,160 1010,160" fill="none" stroke="#15803d" stroke-width="2.2" marker-end="url(#ahg)"/>

  <!-- ============ EXCHANGE / RETENTION LANE ============ -->
  <line x1="40" y1="360" x2="1200" y2="360" stroke="#16140f" stroke-opacity="0.12" stroke-width="1"/>
  <text x="40" y="392" font-size="13" letter-spacing="2" fill="#16140f" opacity="0.5" font-weight="600">EXCHANGE INTEGRATION BOUNDARY — 외부 API 호출만</text>

  <!-- F: 거래소 적립 API -->
  <g>
    <rect x="40" y="416" width="220" height="92" rx="9" fill="#f3f0e7" stroke="#16140f" stroke-opacity="0.14" stroke-dasharray="6 5"/>
    <text x="64" y="452" font-size="16" font-weight="700" fill="#16140f">거래소 적립 메커니즘</text>
    <text x="64" y="477" font-size="13" fill="#16140f" opacity="0.62">출석·매수·미션 (외부)</text>
    <text x="64" y="495" font-size="13" fill="#16140f" opacity="0.62">본체 코드 미수정</text>
  </g>
  <!-- G: webhook event -->
  <g>
    <rect x="312" y="416" width="220" height="92" rx="9" fill="#f3f0e7" stroke="#16140f" stroke-opacity="0.14"/>
    <rect x="312" y="416" width="5" height="92" rx="2.5" fill="#15803d"/>
    <text x="336" y="452" font-size="16" font-weight="700" fill="#16140f">웹훅 수신</text>
    <text x="336" y="477" font-size="13" fill="#16140f" opacity="0.62">exchange_collection_event</text>
    <text x="336" y="495" font-size="13" fill="#16140f" opacity="0.62">event_id 멱등 dedup</text>
  </g>
  <!-- H: retention metric -->
  <g>
    <rect x="584" y="416" width="220" height="92" rx="9" fill="#f3f0e7" stroke="#16140f" stroke-opacity="0.14"/>
    <rect x="584" y="416" width="5" height="92" rx="2.5" fill="#15803d"/>
    <text x="608" y="452" font-size="16" font-weight="700" fill="#16140f">월별 누적 집계</text>
    <text x="608" y="477" font-size="13" fill="#16140f" opacity="0.62">collection_retention_metric</text>
    <text x="608" y="495" font-size="13" fill="#16140f" opacity="0.62">participant_id 귀속 건수</text>
  </g>
  <!-- I: judgment -->
  <g>
    <rect x="856" y="416" width="220" height="92" rx="9" fill="#f3f0e7" stroke="#16140f" stroke-opacity="0.14"/>
    <rect x="856" y="416" width="5" height="92" rx="2.5" fill="#15803d"/>
    <text x="880" y="452" font-size="16" font-weight="700" fill="#16140f">전역 유지 판정</text>
    <text x="880" y="477" font-size="13" fill="#16140f" opacity="0.62">threshold 비교 → success/fail</text>
    <text x="880" y="495" font-size="13" fill="#16140f" opacity="0.62">success 금액 &gt; Layer 1</text>
  </g>

  <g fill="none" stroke="#16140f" stroke-opacity="0.4" stroke-width="2">
    <line x1="260" y1="462" x2="306" y2="462" marker-end="url(#ah)"/>
    <line x1="532" y1="462" x2="578" y2="462" marker-end="url(#ah)"/>
    <line x1="804" y1="462" x2="850" y2="462" marker-end="url(#ah)"/>
  </g>
  <!-- judgment → Layer 3 -->
  <path d="M1076,440 C 1140,440 1110,278 1110,278" fill="none" stroke="#15803d" stroke-width="2.2" stroke-dasharray="2 7" marker-end="url(#ahg)"/>

  <!-- config note -->
  <g transform="translate(40,560)">
    <rect x="0" y="0" width="1170" height="64" rx="10" fill="#f3f0e7" stroke="#16140f" stroke-opacity="0.12"/>
    <text x="22" y="28" font-size="13.5" font-weight="700" fill="#15803d">event_config — 코드 수정 없이 운영 튜닝</text>
    <text x="22" y="50" font-size="12.5" fill="#16140f" opacity="0.66">auto_review 임계 · promotion_cycle_months · service_duration_months · layer3_retention_threshold · reward_amounts (불변식 : layer3_success &gt; layer1_base)</text>
  </g>
</svg>
